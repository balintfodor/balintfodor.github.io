    <script type="text/javascript">
      window.onload = function() { init() };

      function init() {
        Tabletop.init({
          key: '0Ak1ir34mdJh8dEpueDV0Yk1KSmhwMmhfTVBweGl4M1E',
          callback: loaded,
          simpleSheet: true,
          debug: true
        });

      }

      var map_inited = false;
      var map = null;
      var markers = null;
      function get_map() {
        if (map_inited == false) {
          map = L.map('map', {
            center: new L.LatLng(46.893588, 22.488022),
            zoom: 7
          });
          L.tileLayer('http://pelagios.dme.ait.ac.at/tilesets/imperium/{z}/{x}/{y}.png', {
            attribution: 'Tiles: <a href="http://imperium.ahlfeldt.se/">DARE 2014</a>',
            minZoom:3,
            maxZoom:11
          }).addTo(map);
          markers = L.markerClusterGroup();
          map.addLayer(markers);
          map_inited = true;
        }
        return map;
      }

      function loaded(data, tabletop) {
        var map_local = get_map();
        for (i in data) {
          $.getJSON({
            url: 'http://maps.google.com/maps/api/geocode/json',
            data: 'address=' + data[i]['location'] + '&sensor=false',

              console.log(textStatus, data);
